name: DCO Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dco:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch base branch
        run: git fetch origin main

      - name: Run DCO check
        run: ./scripts/check_dco.sh origin/main
